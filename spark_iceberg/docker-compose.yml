  services:
    spark-master:
      image: dinhhoa0102/spark-iceberg:3.5.3
      # Thêm dòng này để Docker tự tìm Dockerfile và build lại
      build: 
        context: .
        dockerfile: Dockerfile
      container_name: spark-master
      hostname: spark-master
      environment:
        - SPARK_MODE=master
        - SPARK_MASTER_HOST=spark-master
        - SPARK_MASTER_PORT=7077
        - SPARK_UI_PORT=8080
      volumes:
        # SỬA LẠI ĐƯỜNG DẪN: Trỏ về thư mục config của MinIO
        # SỬA LẠI ĐÍCH: /opt/spark/conf (không phải /opt/bitnami...)
        - ../minio/config/core-site.xml:/opt/spark/conf/core-site.xml:ro
        # Có thể bỏ hdfs-site.xml nếu dùng MinIO hoàn toàn
        - ../scripts:/opt/spark/scripts
      command: >
        bash -c "/opt/spark/sbin/start-master.sh && tail -f /opt/spark/logs/spark--org.apache.spark.deploy.master*.out"
      ports:
        - "7077:7077"
        - "8080:8080"    
      networks:
        - system_network

    spark-worker:
      image: dinhhoa0102/spark-iceberg:3.5.3
      build: 
        context: .
        dockerfile: Dockerfile
      container_name: spark-worker
      hostname: spark-worker
      environment:
        - SPARK_MODE=worker
        - SPARK_MASTER=spark://spark-master:7077
        - SPARK_WORKER_MEMORY=2g
        - SPARK_WORKER_CORES=1
      volumes:
        # SỬA LẠI ĐƯỜNG DẪN TƯƠNG TỰ MASTER
        - ../minio/config/core-site.xml:/opt/spark/conf/core-site.xml:ro
        - ../scripts:/opt/spark/scripts
      depends_on:
        - spark-master
      command: >
        bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out"
      ports:
        - "8081:8081"
      networks:
        - system_network

    spark-submit:
      image: dinhhoa0102/spark-iceberg:3.5.3
      container_name: spark-submit
      volumes:
        - ../minio/config/core-site.xml:/opt/spark/conf/core-site.xml:ro
        - ../scripts:/opt/spark/scripts
        - ../models:/opt/spark/models
      entrypoint: ["sleep", "infinity"]
      networks:
        - system_network
      depends_on:
        - spark-master

  networks:
    system_network:
      external: true